<!DOCTYPE html>
<html lang="es">
<head>
    <title>Error</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>

<section class="auth-container">

    <div class="auth-card">

        <div class="form-header">
            <h3>Algo salió mal</h3>
            <p class="form-subtitle">
                No se pudo completar la operación.
            </p>
        </div>

        <div class="form-group">
            <p>
                Ocurrió un problema al procesar tu solicitud.
                Intenta nuevamente o vuelve al inicio.
            </p>
        </div>

        <div class="form-group">
            <label>Detalle del error:</label>
            <p id="error-message">
                Aquí aparecerá el mensaje de la excepción.
            </p>
        </div>

        <button class="btn-primary" onclick="location.href='./iniciar-sesion.html'">
            Volver a iniciar sesión
        </button>

        <button class="btn-secondary" onclick="location.href='./index.html'">
            Ir al inicio
        </button>

    </div>

</section>

</body>
</html>
